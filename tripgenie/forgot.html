<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripGenie – Forgot Password</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { background: var(--bg); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .forgot-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #063937, #068cdf);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 26px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #063937; margin-bottom: 8px; }
    p.sub { font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.5; }
    label { display:block; font-size:13px; font-weight:600; color:#063937; margin-bottom:6px; text-align:left; }
    input[type=email] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e8ecf0; border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      box-sizing: border-box; margin-bottom: 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type=email]:focus { border-color: #068cdf; box-shadow: 0 0 0 3px rgba(6,140,223,0.1); }
    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #068cdf, #063937);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { opacity: 0.92; }
    .back-link { margin-top: 20px; display:block; font-size:13px; color:#68778d; }
    .back-link a { color: #068cdf; font-weight: 600; text-decoration: none; }
    .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; text-align:left; display:none; }
    .msg.success { background: #eafaf1; color: #166534; border: 1px solid #bbf7d0; display:block; }
    .msg.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display:block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="forgot-card">
    <div class="logo-mark"><img src="tripgenie-logo.png" alt="TripGenie" style="width:32px;height:32px;object-fit:contain"/></div>
    <h1>Forgot your password?</h1>
    <p class="sub">No worries! Enter your email and we'll send you a link to reset your password.</p>

    <div class="msg" id="successMsg">
      ✅ Reset link sent! Check your inbox (and spam folder just in case).
    </div>
    <div class="msg error" id="errorMsg" style="display:none"></div>

    <div id="formSection">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      <button class="btn-primary" id="sendBtn" onclick="handleForgot()">
        Send Reset Link
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <span class="back-link">Remember your password? <a href="login.html">Sign in</a></span>
  </div>

  <script>
    const API = 'https://ui-production-e419.up.railway.app/api';

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleForgot();
    });

    async function handleForgot() {
      const email  = document.getElementById('email').value.trim();
      const btn    = document.getElementById('sendBtn');
      const errEl  = document.getElementById('errorMsg');
      const sucEl  = document.getElementById('successMsg');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9" stroke-linecap="round"/></svg> Sending…`;

      try {
        const res  = await fetch(`${API}/auth/forgot-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email })
        });
        // Always show success (don't leak whether email exists)
        document.getElementById('formSection').style.display = 'none';
        sucEl.style.display = 'block';
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `Send Reset Link <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
