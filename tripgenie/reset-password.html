<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripGenie – Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { background: var(--bg); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .card {
      background: white; border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #063937, #068cdf);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 26px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #063937; margin-bottom: 8px; }
    p.sub { font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.5; }
    label { display:block; font-size:13px; font-weight:600; color:#063937; margin-bottom:6px; text-align:left; }
    .input-wrap { position:relative; margin-bottom:16px; }
    .input-wrap input {
      width:100%; padding:12px 44px 12px 14px;
      border:1.5px solid #e8ecf0; border-radius:10px;
      font-size:14px; font-family:inherit; outline:none;
      box-sizing:border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap input:focus { border-color:#068cdf; box-shadow:0 0 0 3px rgba(6,140,223,0.1); }
    .toggle-pw {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:#94a3b8;
      display:flex; align-items:center; justify-content:center; padding:4px;
    }
    .strength-wrap { margin-bottom:16px; text-align:left; }
    .strength-bar { height:4px; background:#e8ecf0; border-radius:99px; overflow:hidden; margin-bottom:4px; }
    .strength-fill { height:100%; width:0; border-radius:99px; transition:all 0.3s; }
    .strength-label { font-size:12px; color:#94a3b8; }
    .btn-primary {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#068cdf,#063937);
      color:white; border:none; border-radius:10px;
      font-size:15px; font-weight:600; font-family:inherit;
      cursor:pointer; transition:opacity 0.15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-primary:hover { opacity:0.92; }
    .btn-primary:disabled { opacity:0.6; pointer-events:none; }
    .msg { padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:20px; text-align:left; }
    .msg.success { background:#eafaf1; color:#166534; border:1px solid #bbf7d0; }
    .msg.error   { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .back-link { margin-top:20px; display:block; font-size:13px; color:#68778d; }
    .back-link a { color:#068cdf; font-weight:600; text-decoration:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">🧞</div>
    <h1>Set a new password</h1>
    <p class="sub">Choose a strong password with at least 8 characters, including letters and numbers.</p>

    <div class="msg error" id="errorMsg" style="display:none"></div>
    <div class="msg success" id="successMsg" style="display:none"></div>

    <div id="formSection">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter new password" oninput="checkStrength(this.value)" />
        <button class="toggle-pw" type="button" onclick="togglePw('password', this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-wrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>

      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirmPassword" placeholder="Re-enter new password" />
        <button class="toggle-pw" type="button" onclick="togglePw('confirmPassword', this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button class="btn-primary" id="resetBtn" onclick="handleReset()">
        Reset Password
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <span class="back-link">Remember it? <a href="login.html">Back to Sign In</a></span>
  </div>

  <script>
    const API = 'https://ui-production-e419.up.railway.app/api';

    // Get token from URL
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('errorMsg').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('formSection').style.display = 'none';
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    function checkStrength(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!val) { fill.style.width = '0%'; label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w:'25%', bg:'#ef4444', text:'Weak' },
        { w:'50%', bg:'#f97316', text:'Fair' },
        { w:'75%', bg:'#eab308', text:'Good' },
        { w:'100%',bg:'#22c55e', text:'Strong' },
      ];
      const l = levels[score - 1] || levels[0];
      fill.style.width      = l.w;
      fill.style.background = l.bg;
      label.textContent     = l.text;
      label.style.color     = l.bg;
    }

    document.getElementById('confirmPassword')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleReset();
    });

    async function handleReset() {
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn             = document.getElementById('resetBtn');
      const errEl           = document.getElementById('errorMsg');
      const sucEl           = document.getElementById('successMsg');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (password.length < 8)             { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display='block'; return; }
      if (!/[A-Za-z]/.test(password))      { errEl.textContent = 'Password must contain at least one letter.'; errEl.style.display='block'; return; }
      if (!/[0-9]/.test(password))         { errEl.textContent = 'Password must contain at least one number.'; errEl.style.display='block'; return; }
      if (password !== confirmPassword)    { errEl.textContent = 'Passwords do not match.'; errEl.style.display='block'; return; }

      btn.disabled = true;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9" stroke-linecap="round"/></svg> Resetting…`;

      try {
        const res  = await fetch(`${API}/auth/reset-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Reset failed.');

        document.getElementById('formSection').style.display = 'none';
        sucEl.textContent = '✅ Password reset! Redirecting to login…';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 2500);
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `Reset Password <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
